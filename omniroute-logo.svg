<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300">
  <title>OmniRoute — Multi-Master Trade Copier</title>
  <desc>Professional logo for OmniRoute, electric blue on dark background</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700&amp;family=Geist+Mono:wght@400;600&amp;display=swap');
    </style>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0070f3"/>
      <stop offset="100%" stop-color="#0040c0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#0070f3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0040c0" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="640" height="300" rx="16" fill="#05070a"/>
  <rect width="640" height="300" rx="16" fill="none" stroke="#1a2236" stroke-width="1"/>

  <!-- Subtle grid -->
  <line x1="0" y1="150" x2="640" y2="150" stroke="#0c1018" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="300" stroke="#0c1018" stroke-width="1"/>

  <!-- ── MARK ── centred at (128, 150) -->
  <g transform="translate(128,150)">
    <!-- Orbit ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#0070f3" stroke-width="0.6" opacity="0.18" stroke-dasharray="5 8"/>

    <!-- Connection lines -->
    <line x1="14" y1="-9"  x2="56" y2="-52" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="18" y1="0"   x2="66" y2="0"   stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="14" y1="9"   x2="56" y2="52"  stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="-14" y1="-9" x2="-50" y2="-44" stroke="#243048" stroke-width="1.2" opacity="0.85"/>
    <line x1="-50" y1="-44" x2="20" y2="-52" stroke="#0070f3" stroke-width="1.2" opacity="0.4"/>

    <!-- Pulse dots -->
    <circle cx="35" cy="-30" r="2.5" fill="#3b9eff" filter="url(#glow2)"/>
    <circle cx="42" cy="0"   r="2.5" fill="#3b9eff" filter="url(#glow2)"/>
    <circle cx="35" cy="30"  r="2.5" fill="#3b9eff" filter="url(#glow2)"/>

    <!-- Slave nodes -->
    <rect x="56" y="-65" width="18" height="18" rx="4" fill="#0c1018" stroke="#1a2236" stroke-width="1"/>
    <rect x="60" y="-61" width="10" height="10" rx="2" fill="#0070f3" opacity="0.75"/>

    <rect x="66" y="-9"  width="18" height="18" rx="4" fill="#0c1018" stroke="#1a2236" stroke-width="1"/>
    <rect x="70" y="-5"  width="10" height="10" rx="2" fill="#0070f3" opacity="0.75"/>

    <rect x="56" y="47"  width="18" height="18" rx="4" fill="#0c1018" stroke="#1a2236" stroke-width="1"/>
    <rect x="60" y="51"  width="10" height="10" rx="2" fill="#0070f3" opacity="0.75"/>

    <!-- Secondary master node -->
    <circle cx="-50" cy="-44" r="10" fill="#080c12" stroke="#243048" stroke-width="1.3"/>
    <circle cx="-50" cy="-44" r="5"  fill="#0070f3" opacity="0.45" filter="url(#glow2)"/>

    <!-- Main hexagon -->
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="url(#hexGrad)" filter="url(#glow)"/>
    <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="none" stroke="#3b9eff" stroke-width="1" opacity="0.55"/>
    <line x1="-8" y1="0" x2="8" y2="0"  stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="0" y2="8"  stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Vertical divider -->
  <line x1="224" y1="90" x2="224" y2="218" stroke="#1a2236" stroke-width="1"/>

  <!-- ── WORDMARK ── -->
  <!-- "Omni" in blue -->
  <text x="244" y="145"
    font-family="'Instrument Sans', 'Segoe UI', Arial, sans-serif"
    font-weight="700" font-size="54" letter-spacing="-1.5"
    fill="#0070f3">Omni</text>
  <!-- "Route" in light -->
  <text x="370" y="145"
    font-family="'Instrument Sans', 'Segoe UI', Arial, sans-serif"
    font-weight="700" font-size="54" letter-spacing="-1.5"
    fill="#cdd9ee">Route</text>

  <!-- Divider line with blue accent -->
  <rect x="244" y="158" width="352" height="1.5" rx="1" fill="#1a2236"/>
  <rect x="244" y="158" width="110" height="1.5" rx="1" fill="#0070f3" opacity="0.85"/>

  <!-- Tagline -->
  <text x="246" y="180"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="11" letter-spacing="2.8" fill="#4a5878">MULTI-MASTER TRADE COPIER</text>

  <!-- Pills -->
  <rect x="246" y="196" width="76" height="18" rx="4" fill="#0070f312" stroke="#0070f332" stroke-width="1"/>
  <text x="284" y="209" text-anchor="middle"
    font-family="'Geist Mono', monospace" font-size="10" fill="#3b9eff">v 2.2.0</text>

  <rect x="332" y="196" width="96" height="18" rx="4" fill="#00d68f10" stroke="#00d68f28" stroke-width="1"/>
  <text x="380" y="209" text-anchor="middle"
    font-family="'Geist Mono', monospace" font-size="10" fill="#00d68f">Low Latency</text>

  <rect x="438" y="196" width="80" height="18" rx="4" fill="#0070f312" stroke="#0070f332" stroke-width="1"/>
  <text x="478" y="209" text-anchor="middle"
    font-family="'Geist Mono', monospace" font-size="10" fill="#3b9eff">MT5 Native</text>

  <!-- Corner accents -->
  <path d="M16 16 L16 30 M16 16 L30 16" stroke="#0070f3" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M624 16 L624 30 M624 16 L610 16" stroke="#0070f3" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M16 284 L16 270 M16 284 L30 284" stroke="#0070f3" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M624 284 L624 270 M624 284 L610 284" stroke="#0070f3" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
</svg>
