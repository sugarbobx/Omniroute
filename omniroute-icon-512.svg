<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <title>OmniRoute icon</title>
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0070f3"/>
      <stop offset="100%" stop-color="#0040c0"/>
    </linearGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b9eff"/>
      <stop offset="100%" stop-color="#0070f3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#05070a"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#1a2236" stroke-width="2"/>

  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#0070f3" stroke-width="1.5" opacity="0.15" stroke-dasharray="12 18"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#0070f3" stroke-width="1" opacity="0.1" stroke-dasharray="6 10"/>

  <!-- Connection lines -->
  <line x1="286" y1="226" x2="360" y2="152" stroke="#0070f3" stroke-width="3" opacity="0.65"/>
  <line x1="296" y1="256" x2="380" y2="256" stroke="#0070f3" stroke-width="3" opacity="0.65"/>
  <line x1="286" y1="286" x2="360" y2="360" stroke="#0070f3" stroke-width="3" opacity="0.65"/>
  <line x1="226" y1="226" x2="152" y2="152" stroke="#243048" stroke-width="2.5" opacity="0.8"/>
  <line x1="152" y1="152" x2="286" y2="142" stroke="#0070f3" stroke-width="2" opacity="0.35"/>

  <!-- Pulse dots -->
  <circle cx="323" cy="204" r="8" fill="#3b9eff" filter="url(#glow2)"/>
  <circle cx="338" cy="256" r="8" fill="#3b9eff" filter="url(#glow2)"/>
  <circle cx="323" cy="308" r="8" fill="#3b9eff" filter="url(#glow2)"/>

  <!-- Slave nodes -->
  <rect x="350" y="138" width="44" height="44" rx="10" fill="#0c1018" stroke="#1a2236" stroke-width="2"/>
  <rect x="360" y="148" width="24" height="24" rx="5" fill="url(#ng)" opacity="0.85"/>

  <rect x="376" y="234" width="44" height="44" rx="10" fill="#0c1018" stroke="#1a2236" stroke-width="2"/>
  <rect x="386" y="244" width="24" height="24" rx="5" fill="url(#ng)" opacity="0.85"/>

  <rect x="350" y="330" width="44" height="44" rx="10" fill="#0c1018" stroke="#1a2236" stroke-width="2"/>
  <rect x="360" y="340" width="24" height="24" rx="5" fill="url(#ng)" opacity="0.85"/>

  <!-- Secondary master -->
  <circle cx="152" cy="152" r="26" fill="#080c12" stroke="#243048" stroke-width="2"/>
  <circle cx="152" cy="152" r="12" fill="#0070f3" opacity="0.4" filter="url(#glow2)"/>

  <!-- Main hexagon -->
  <polygon points="256,172 322,210 322,302 256,340 190,302 190,210"
    fill="url(#hg)" filter="url(#glow)"/>
  <polygon points="256,188 308,218 308,294 256,324 204,294 204,218"
    fill="none" stroke="#3b9eff" stroke-width="2" opacity="0.45"/>

  <!-- Cross mark -->
  <line x1="216" y1="256" x2="296" y2="256" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <line x1="256" y1="216" x2="256" y2="296" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
</svg>
